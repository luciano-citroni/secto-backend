# Configuração específica para testes
spring.application.name=Spring API made for sectotech voice analysis system - Tests

# Banco H2 in-memory para testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate para H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway desabilitado para testes (usando create-drop)
spring.flyway.enabled=false

# OpenAI - chaves dummy para testes
spring.ai.openai.api-key=test-openai-key
openai.api-key=test-openai-key

# AWS S3 - configuração dummy para testes
aws.s3.endpoint=http://localhost:9000
aws.s3.region=us-east-1
aws.access-key=test-access-key
aws.secret-key=test-secret-key
aws.s3.bucket-name=test-bucket

# Keycloak - configuração dummy para testes
keycloak.admin-url=http://localhost:8080/admin
keycloak.realm=test-realm
keycloak.admin-username=admin
keycloak.admin-password=admin

# OAuth2 - DESABILITADO para testes
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/test-realm
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/test-realm/protocol/openid-connect/certs
# spring.security.oauth2.client.registration.keycloak.client-id=test-client
# spring.security.oauth2.client.registration.keycloak.client-secret=test-secret
# spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
# spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
# spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/test-realm
# spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# Desabilita autoconfigurações que dependem de serviços externos
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# Stripe - chaves dummy para testes
stripe.public.key=pk_test_dummy
stripe.secret.key=sk_test_dummy
stripe.webhook.secret=whsec_test_dummy

# URLs dummy para testes
app.frontend-url=http://localhost:3000

# Multipart config
spring.servlet.multipart.max-file-size=50MB

# Logging para testes
logging.level.com.bridge.secto=DEBUG
logging.level.org.springframework.security=DEBUG