spring.application.name=Spring API made for sectotech voice analysis system

spring.datasource.url=jdbc:postgresql://localhost:5432/secto_db
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# OpenAI Configuration - Use environment variables for security
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:your-key-here}

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Application Info
info.app.name=Secto Voice Analysis API
info.app.description=API para sistema de análise de voz da Sectotech
info.app.version=1.0.0
info.app.author=Javier
