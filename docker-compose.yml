services:
  postgres:
    image: postgres:15
    container_name: secto-postgres
    environment:
      POSTGRES_DB: secto_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d secto_db"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data: