spring.application.name=Spring API made for sectotech voice analysis system

spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DB:secto_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:your-key-here}

openai.api-key=${OPENAI_API_KEY:your-key-here}


management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

server.servlet.context-path=/api

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
